<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RS3 Soul Tracker</title>
    <link rel="stylesheet" href="theme.css" />
  </head>
  <body>
    <div class="panel">
      <div class="panel__header">
        <div class="panel__title">Soul Tracker</div>
        <div class="panel__subtitle" id="status">Loading&hellip;</div>
      </div>

      <div class="panel__section">
        <div class="row">
          <button id="btnRefresh" class="btn btn--primary">Refresh chat detection</button>
          <button id="btnTest" class="btn">Test alert</button>
        </div>
        <div class="hint">
          Chatbox is auto-detected &mdash; no calibration needed.
          Enable <strong>timestamps</strong> in RS3 Chat Settings for reliable deduplication.
        </div>
      </div>

      <div class="panel__section">
        <div class="row row--split">
          <label class="field">
            <div class="field__label">Cooldown (seconds)</div>
            <input id="cooldownSec" class="input" type="number" min="1" max="600" value="30" />
          </label>

          <label class="field">
            <div class="field__label">Scan interval (ms)</div>
            <input id="scanMs" class="input" type="number" min="100" max="2000" value="350" />
          </label>
        </div>

        <div class="row row--split" style="margin-top:10px">
          <label class="check">
            <input type="checkbox" id="enableSound" checked />
            <span>Sound</span>
          </label>

          <label class="check">
            <input type="checkbox" id="enableVisual" checked />
            <span>Visual toast</span>
          </label>
        </div>
      </div>

      <div class="panel__section">
        <div class="sectionTitle">Detected (latest)</div>
        <div id="log" class="log"></div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true">
      <div class="toast__inner">
        <div class="toast__title" id="toastTitle">Soul detected</div>
        <div class="toast__body" id="toastBody"></div>
      </div>
    </div>

    <audio id="alertAudio" preload="auto">
      <source src="./soul_detected_check_your_rs.mp3" type="audio/mpeg" />
    </audio>

    <!--
      Load order matters:
        1. a1lib-base  -> sets globalThis.A1lib
        2. a1lib-ocr   -> depends on A1lib, sets globalThis.OCR
        3. a1lib-chatbox -> depends on A1lib + OCR, sets globalThis.Chatbox
        4. chatreader  -> wraps Chatbox.default as window.SoulChatReader
        5. app         -> main plugin logic
    -->
    <script src="lib/a1lib-base.js"></script>
    <script src="lib/a1lib-ocr.js"></script>
    <script src="lib/a1lib-chatbox.js"></script>
    <script src="chatreader.js"></script>
    <script src="app.js"></script>
  </body>
</html>
